<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - Challenging Puzzle</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@500;700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="brand display" href="index.html">🧩 <span data-i18n="site_name">Challenging Puzzle</span></a>
      <div class="right">
        <div id="authStatus"></div>
        <button class="lang-toggle" onclick="toggleLang()">বাংলা</button>
      </div>
    </div>

    <div class="card" id="profileCard">
      <h2 data-i18n="profile_title">My Profile</h2>
      <div id="profileInfo"></div>
    </div>

    <div class="card hidden" id="scoresCard">
      <h3 data-i18n="your_scores">Your Scores</h3>
      <table>
        <thead>
          <tr>
            <th data-i18n="th_difficulty">Level</th>
            <th data-i18n="th_time">Time</th>
            <th data-i18n="th_score">Score</th>
          </tr>
        </thead>
        <tbody id="scoreRows"></tbody>
      </table>
      <div class="msg" id="emptyMsg"></div>
    </div>

    <p style="text-align:center; margin-top:14px;">
      <a href="index.html" data-i18n="back_to_home">Back to Home</a>
    </p>
  </div>

  <script src="i18n.js"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    renderAuthStatus('authStatus');

    async function loadProfile() {
      const user = await getCurrentUser();
      const infoEl = document.getElementById('profileInfo');

      if (!user) {
        infoEl.innerHTML = `<p>${t('please_login')}</p><a class="btn btn-primary" href="login.html" style="margin-top:10px; display:inline-block;" data-i18n="login_btn">Login / Sign Up</a>`;
        applyLang();
        return;
      }

      const { data: profile } = await supabaseClient
        .from('profiles')
        .select('username')
        .eq('id', user.id)
        .single();

      const name = profile ? profile.username : user.email;

      infoEl.innerHTML = `
        <p><b>${escapeHtml(name)}</b></p>
        <p style="color:var(--text-muted); font-size:13px; margin-top:4px;">${escapeHtml(user.email)}</p>
      `;

      document.getElementById('scoresCard').classList.remove('hidden');

      const { data: scores, error } = await supabaseClient
        .from('scores')
        .select('difficulty, time_seconds, score, played_at')
        .eq('user_id', user.id)
        .order('played_at', { ascending: false })
        .limit(20);

      const rowsEl = document.getElementById('scoreRows');
      const emptyEl = document.getElementById('emptyMsg');

      if (error || !scores || scores.length === 0) {
        emptyEl.textContent = t('no_personal_scores');
        return;
      }

      scores.forEach(row => {
        const m = String(Math.floor(row.time_seconds / 60)).padStart(2, '0');
        const s = String(row.time_seconds % 60).padStart(2, '0');
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(row.difficulty || '-')}</td>
          <td>${m}:${s}</td>
          <td>${row.score}</td>
        `;
        rowsEl.appendChild(tr);
      });
    }

    loadProfile();
  </script>
</body>
</html>
