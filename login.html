<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Challenging Puzzle</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@500;700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="page" style="max-width:420px;">
    <div class="topbar">
      <a class="brand display" href="index.html">🧩 <span data-i18n="site_name">Challenging Puzzle</span></a>
      <button class="lang-toggle" onclick="toggleLang()">বাংলা</button>
    </div>

    <div class="card">
      <div class="tabs">
        <div class="tab active" id="tab-login" onclick="switchTab('login')" data-i18n="tab_login">Login</div>
        <div class="tab" id="tab-signup" onclick="switchTab('signup')" data-i18n="tab_signup">Sign Up</div>
      </div>

      <!-- LOGIN -->
      <form id="login-form">
        <div class="form-group">
          <label data-i18n="label_email">Email</label>
          <input type="email" id="login-email" required />
        </div>
        <div class="form-group">
          <label data-i18n="label_password">Password</label>
          <input type="password" id="login-password" required />
        </div>
        <button type="submit" class="btn-primary" style="width:100%;" data-i18n="btn_login">Login</button>
      </form>

      <!-- SIGNUP -->
      <form id="signup-form" class="hidden">
        <div class="form-group">
          <label data-i18n="label_username">Display name</label>
          <input type="text" id="signup-username" required maxlength="20" />
        </div>
        <div class="form-group">
          <label data-i18n="label_email">Email</label>
          <input type="email" id="signup-email" required />
        </div>
        <div class="form-group">
          <label data-i18n="label_password_min">Password (min 6 characters)</label>
          <input type="password" id="signup-password" minlength="6" required />
        </div>
        <button type="submit" class="btn-primary" style="width:100%;" data-i18n="btn_signup">Create Account</button>
      </form>

      <div class="msg" id="msg"></div>
    </div>

    <p style="text-align:center; margin-top:14px;">
      <a href="index.html" data-i18n="back_to_home">Back to Home</a>
    </p>
  </div>

  <script src="i18n.js"></script>
  <script src="config.js"></script>
  <script>
    function switchTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
      document.getElementById('msg').textContent = '';
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      showMsg(t('msg_logging_in'), '');
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        showMsg(t('msg_wrong_credentials'), 'error');
      } else {
        window.location.href = 'index.html';
      }
    });

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('signup-username').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;

      showMsg(t('msg_creating_account'), '');

      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: { data: { username } }
      });

      if (error) {
        showMsg(error.message, 'error');
        return;
      }

      // Create profile row (id must match auth user id)
      if (data.user) {
        await supabaseClient.from('profiles').upsert({
          id: data.user.id,
          username: username
        });
      }

      showMsg(t('msg_account_created'), 'success');
      switchTab('login');
    });

    // If already logged in, go home
    (async () => {
      const { data } = await supabaseClient.auth.getSession();
      if (data.session) window.location.href = 'index.html';
    })();
  </script>
</body>
</html>
